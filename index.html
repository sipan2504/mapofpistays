<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map of Pi Stays</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
}

header{
  background:#6f3ff5;
  color:white;
  padding:15px;
  text-align:center;
  font-size:22px;
}

#status{
  text-align:center;
  padding:10px;
}

#loginBtn{
  display:block;
  margin:10px auto;
  padding:12px 20px;
  font-size:18px;
}

#map{
  width:100%;
  height:65vh;
}

#addStay{
  display:none;
  padding:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  box-sizing:border-box;
}

.saveBtn{
  width:100%;
  padding:14px;
  font-size:18px;
}

.bottom-menu{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  border-top:1px solid #ddd;
  padding:12px 0;
  font-size:26px;
}
</style>
</head>

<body>

<header>
🌍 Map of Pi Stays
</header>

<div id="status">
Başlatılıyor...
</div>

<button id="loginBtn">
Pi Giriş Yap
</button>

<div id="map"></div>

<div id="addStay">

<h2>➕ Yeni Konaklama</h2>

<input id="stayName"
placeholder="Konaklama Adı">

<input id="stayCountry"
placeholder="Ülke">

<input id="stayCity"
placeholder="Şehir">

<textarea id="stayDesc"
placeholder="Açıklama"></textarea>

<input id="stayLat"
placeholder="Enlem (Latitude)">

<input id="stayLng"
placeholder="Boylam (Longitude)">

<button class="saveBtn"
onclick="saveStay()">
Kaydet
</button>

</div>

<div class="bottom-menu">
<div onclick="showHome()">🏠</div>
<div onclick="showAddStay()">➕</div>
<div>❤️</div>
<div>👤</div>
</div>

<script>

let currentUser = null;
let map = null;

async function initPi() {
  try {
    await Pi.init({
      version: "2.0",
      sandbox: false
    });

    document.getElementById("status").innerHTML =
      "Pi hazır ✅";

  } catch (e) {

    document.getElementById("status").innerHTML =
      "Pi SDK hatası ❌";

    console.log(e);
  }
}

async function loginPi() {

  try {

    currentUser =
      await Pi.authenticate(
        ["username"],
        function(){
          return true;
        }
      );

    document.getElementById("status").innerHTML =
      "Giriş başarılı ✅";

  } catch (e) {

    document.getElementById("status").innerHTML =
      "Giriş başarısız ❌";

    console.log(e);
  }
}

document.getElementById("loginBtn")
.onclick = loginPi;

function initMap() {

  map = L.map("map")
    .setView([41,29],3);

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      attribution:
      "&copy; OpenStreetMap"
    }
  ).addTo(map);

  addPin(
    41.0082,
    28.9784,
    "Dilek's Home",
    "İstanbul",
    "Türkiye"
  );

  addPin(
    38.6431,
    34.8270,
    "Cave Stay",
    "Kapadokya",
    "Türkiye"
  );

  addPin(
    48.8566,
    2.3522,
    "Paris Apartment",
    "Paris",
    "Fransa"
  );

  addPin(
    41.9028,
    12.4964,
    "Roma House",
    "Roma",
    "İtalya"
  );

  let stays =
    JSON.parse(
      localStorage.getItem("stays")
      || "[]"
    );

  stays.forEach(function(stay){

    addPin(
      stay.lat,
      stay.lng,
      stay.name,
      stay.city,
      stay.country,
      stay.desc
    );

  });

  if(navigator.geolocation){

    navigator.geolocation
      .getCurrentPosition(
        function(pos){

          const lat =
            pos.coords.latitude;

          const lng =
            pos.coords.longitude;

          L.marker([lat,lng])
            .addTo(map)
            .bindPopup(
              "📍 Konumunuz"
            );

        }
      );

  }

}

function addPin(
  lat,
  lng,
  name,
  city,
  country,
  desc=""
){

  L.marker([lat,lng])
    .addTo(map)
    .bindPopup(
      "🏠 " + name +
      "<br>📍 " +
      city +
      ", " +
      country +
      "<br>📝 " +
      desc
    );

}

function showAddStay(){

  document
    .getElementById("map")
    .style.display =
    "none";

  document
    .getElementById("addStay")
    .style.display =
    "block";

}

function showHome(){

  document
    .getElementById("map")
    .style.display =
    "block";

  document
    .getElementById("addStay")
    .style.display =
    "none";

}

function saveStay(){

  const stay = {
    name:
      document.getElementById(
        "stayName"
      ).value,

    country:
      document.getElementById(
        "stayCountry"
      ).value,

    city:
      document.getElementById(
        "stayCity"
      ).value,

    desc:
      document.getElementById(
        "stayDesc"
      ).value,

    lat:
      parseFloat(
        document.getElementById(
          "stayLat"
        ).value
      ),

    lng:
      parseFloat(
        document.getElementById(
          "stayLng"
        ).value
      )
  };

  let stays =
    JSON.parse(
      localStorage.getItem("stays")
      || "[]"
    );

  stays.push(stay);

  localStorage.setItem(
    "stays",
    JSON.stringify(stays)
  );

  addPin(
    stay.lat,
    stay.lng,
    stay.name,
    stay.city,
    stay.country,
    stay.desc
  );

  alert(
    "Konaklama kaydedildi ✅"
  );

  showHome();

}

window.onload =
function(){

  initPi();
  initMap();

};

</script>

</body>
</html>
