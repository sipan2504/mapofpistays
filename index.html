<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Test App</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
font-family:Arial,sans-serif;
text-align:center;
padding-top:80px;
}
button{
padding:15px 30px;
font-size:20px;
margin:10px;
}
</style>
</head>

<body>

<h1>Pi Test App</h1>

<p id="status">Yükleniyor...</p>

<button id="loginBtn">Pi Giriş Yap</button>
<br>
<button id="payBtn">0.01 Pi Gönder</button>

<script>

let currentUser = null;

async function loginPi() {

  try {

    Pi.init({
      version: "2.0",
      sandbox: true
    });

    const scopes = ["username", "payments"];

    currentUser = await Pi.authenticate(scopes);

    document.getElementById("status").innerHTML =
      "Giriş başarılı ✅";

    console.log(currentUser);

  } catch (err) {

    console.log(err);

    document.getElementById("status").innerHTML =
      "Giriş başarısız ❌";
  }
}

async function sendPayment() {

  if (!currentUser) {
    alert("Önce giriş yap");
    return;
  }

  Pi.createPayment(
    {
      amount: 0.01,
      memo: "Pi Test Payment",
      metadata: {
        test: true
      }
    },
    {
      onReadyForServerApproval: function(paymentId) {
        console.log("Approval:", paymentId);
      },

      onReadyForServerCompletion: function(paymentId) {
        document.getElementById("status").innerHTML =
          "Ödeme tamamlandı ✅";
      },

      onCancel: function() {
        document.getElementById("status").innerHTML =
          "İşlem iptal edildi";
      },

      onError: function(error) {
        console.log(error);
        document.getElementById("status").innerHTML =
          "Ödeme hatası ❌";
      }
    }
  );
}

document.getElementById("loginBtn").addEventListener("click", loginPi);
document.getElementById("payBtn").addEventListener("click", sendPayment);

window.onload = loginPi;

</script>

</body>
</html>
