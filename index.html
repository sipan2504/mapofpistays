<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Pi Test Ödeme</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; font-family:sans-serif; margin-top:100px;">

  <h1>Pi Test Ödeme</h1>

  <button onclick="payWithPi()" style="padding:15px; font-size:18px;">
    0.01 Pi Gönder
  </button>

  <p id="status"></p>

  <script>
    Pi.init({ version: "2.0", sandbox: true });

    function payWithPi() {
      document.getElementById("status").innerText = "Ödeme başlatılıyor...";

      Pi.createPayment({
        amount: 0.01,
        memo: "Test ödeme",
        metadata: { orderId: "12345" }
      }, {
        onReadyForServerApproval: function(paymentId) {
          console.log("Hazır:", paymentId);

          // OTOMATİK ONAY (EN KRİTİK KISIM)
          setTimeout(function() {
            Pi.completePayment(paymentId);
          }, 1000);
        },

        onReadyForServerCompletion: function(paymentId, txid) {
          document.getElementById("status").innerText = "Ödeme tamamlandı ✅";
          console.log("Tamamlandı:", paymentId, txid);
        },

        onCancel: function(paymentId) {
          document.getElementById("status").innerText = "İptal edildi ❌";
        },

        onError: function(error, payment) {
          document.getElementById("status").innerText = "Hata oluştu ❌";
          console.error(error);
        }
      });
    }
  </script>

</body>
</html>
