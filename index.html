<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<title>Pi Test</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:80px;">

<h2>Pi Test App</h2>

<p id="status">Başlatılıyor...</p>

<button id="payBtn">0.01 Pi Gönder</button>

<script>

let currentUser = null;

async function startPi() {

  try {

    Pi.init({
      version: "2.0",
      sandbox: true
    });

    document.getElementById("status").innerText =
      "Pi hazır. Giriş bekleniyor...";

    currentUser = await Pi.authenticate(
      ["payments"],
      function(payment) {},
      function(paymentId) {}
    );

    document.getElementById("status").innerText =
      "Giriş başarılı ✅";

  } catch(err) {

    console.log(err);

    document.getElementById("status").innerText =
      "Giriş başarısız ❌";
  }
}

window.onload = startPi;

document.getElementById("payBtn").onclick = function() {

  if(!currentUser){
    document.getElementById("status").innerText =
      "Önce giriş yapılmalı";
    return;
  }

  Pi.createPayment(

    {
      amount: 0.01,
      memo: "Pi Test Payment",
      metadata: {
        type: "test"
      }
    },

    {
      onReadyForServerApproval: function(paymentId) {
        console.log("Approval:", paymentId);
      },

      onReadyForServerCompletion: function(paymentId) {
        console.log("Completion:", paymentId);

        document.getElementById("status").innerText =
          "Ödeme tamamlandı ✅";
      },

      onCancel: function(paymentId) {

        document.getElementById("status").innerText =
          "Ödeme iptal edildi";
      },

      onError: function(error) {

        console.log(error);

        document.getElementById("status").innerText =
          "Ödeme hatası ❌";
      }
    }
  );
};

</script>

</body>
</html>
