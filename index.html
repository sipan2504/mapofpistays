<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Test App</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
font-family:Arial,sans-serif;
text-align:center;
padding-top:100px;
}

button{
padding:15px 30px;
font-size:24px;
margin:10px;
}
</style>
</head>

<body>

<h1>Pi Test App</h1>

<p id="status">Başlatılıyor...</p>

<button id="loginBtn">Pi Giriş Yap</button>
<br>
<button id="payBtn">0.01 Pi Gönder</button>

<script>

let currentUser = null;

async function initPi() {

  try {

    await Pi.init({
      version: "2.0",
      sandbox: false
    });

    document.getElementById("status").innerHTML =
      "Pi hazır ✅";

    autoLogin();

  } catch(e) {

    document.getElementById("status").innerHTML =
      "Pi SDK hatası ❌";

    console.log(e);
  }
}

async function autoLogin() {

  try {

    const auth = await Pi.authenticate(
      ["username","payments"],
      function(payment){ return payment; }
    );

    currentUser = auth;

    document.getElementById("status").innerHTML =
      "Giriş başarılı ✅";

  } catch(e) {

    document.getElementById("status").innerHTML =
      "Giriş başarısız ❌";

    console.log(e);
  }
}

document.getElementById("loginBtn").onclick = autoLogin;

document.getElementById("payBtn").onclick = function(){

  if(!currentUser){
    alert("Önce giriş yap");
    return;
  }

  Pi.createPayment(
    {
      amount: 0.01,
      memo: "Pi Test",
      metadata: {
        app: "MapOfPiStays",
        test: true
      }
    },
    {
      onReadyForServerApproval: function(paymentId){
        console.log(paymentId);
      },

      onReadyForServerCompletion: function(paymentId){
        document.getElementById("status").innerHTML =
          "Ödeme tamamlandı ✅";
      },

      onCancel: function(){
        document.getElementById("status").innerHTML =
          "Ödeme iptal edildi";
      },

      onError: function(error){
        document.getElementById("status").innerHTML =
          "Ödeme hatası ❌";
        console.log(error);
      }
    }
  );
};

window.onload = initPi;

</script>

</body>
</html>
