<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; margin-top:100px;">

<h2>Pi Ödeme</h2>

<button id="loginBtn">Giriş Yap</button>
<br><br>
<button id="payBtn">0.01 Pi Gönder</button>

<p id="t"></p>

<script>
  Pi.init({
    version: "2.0",
    key: "nbzcpf7bttj8xagxzqva2ldujjr6jk7zdyfgep2jiv52vzcje3qkxq5ohvlms1zb"
  });

  let user = null;

  document.getElementById("loginBtn").onclick = function() {
    Pi.authenticate(['payments'], function(auth) {
      user = auth.user;
      document.getElementById("t").innerText = "Giriş başarılı ✅";
    }, function() {
      document.getElementById("t").innerText = "Giriş hatası";
    });
  };

  document.getElementById("payBtn").onclick = function() {
    if (!user) {
      document.getElementById("t").innerText = "Önce giriş yap!";
      return;
    }

    Pi.createPayment({
      amount: 0.01,
      memo: "Test",
      metadata: {}
    }, {
      onReadyForServerApproval: function(paymentId) {
        console.log(paymentId);
      },
      onReadyForServerCompletion: function() {
        document.getElementById("t").innerText = "Tamamlandı ✅";
      },
      onCancel: function() {
        document.getElementById("t").innerText = "İptal";
      },
      onError: function(e) {
        document.getElementById("t").innerText = "Hata";
        console.log(e);
      }
    });
  };
</script>

</body>
</html>
