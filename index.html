<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map of Pi Stays</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
font-family:Arial,sans-serif;
text-align:center;
padding-top:100px;
}

button{
padding:15px 30px;
font-size:22px;
margin:10px;
}
</style>
</head>

<body>

<h1>Map of Pi Stays</h1>

<p id="status">Başlatılıyor...</p>

<button id="loginBtn">Pi Giriş Yap</button>

<script>

let currentUser = null;

async function initPi() {

  try {

    await Pi.init({
      version: "2.0",
      sandbox: false
    });

    document.getElementById("status").innerHTML =
      "Pi hazır ✅";

  } catch(e) {

    document.getElementById("status").innerHTML =
      "Pi SDK hatası ❌";

    console.log(e);
  }
}

async function loginPi() {

  try {

    const auth = await Pi.authenticate(
      ["username"],
      function(){ return true; }
    );

    currentUser = auth;

    document.getElementById("status").innerHTML =
      "Giriş başarılı ✅<br><br>Kullanıcı: " +
      auth.username;

  } catch(e) {

    document.getElementById("status").innerHTML =
      "Giriş başarısız ❌";

    console.log(e);
  }
}

document.getElementById("loginBtn").onclick = loginPi;

window.onload = initPi;

</script>

</body>
</html>
