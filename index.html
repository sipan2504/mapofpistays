<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; margin-top:100px;">

<h2>Pi Test Ödeme</h2>

<button onclick="login()">Giriş Yap</button>
<br><br>
<button onclick="pay()">0.01 Pi Gönder</button>

<p id="t"></p>

<script>
Pi.init({
  version: "2.0",
  sandbox: true
});

function login() {
  Pi.authenticate(['payments'], function(auth) {
    document.getElementById("t").innerText = "Giriş başarılı ✅";
  }, function(error) {
    document.getElementById("t").innerText = "Giriş hatası ❌";
  });
}

function pay() {
  document.getElementById("t").innerText = "Ödeme başlatılıyor...";

  Pi.createPayment({
    amount: 0.01,
    memo: "Test",
    metadata: {}
  }, {
    onReadyForServerApproval: function(paymentId) {
      setTimeout(function() {
        Pi.completePayment(paymentId);
      }, 1000);
    },
    onReadyForServerCompletion: function() {
      document.getElementById("t").innerText = "Tamamlandı ✅";
    },
    onCancel: function() {
      document.getElementById("t").innerText = "İptal";
    },
    onError: function() {
      document.getElementById("t").innerText = "Hata ❌";
    }
  });
}
</script>

</body>
</html>
