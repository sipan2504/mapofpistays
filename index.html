<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; margin-top:100px;">

<h2>Pi Test</h2>

<button id="loginBtn">Giriş Yap</button>
<br><br>
<button id="payBtn">0.01 Pi Gönder</button>

<p id="t">Yükleniyor...</p>

<script>
let user = null;

// Pi başlat
window.onload = async function () {
  try {
    await Pi.init({ version: "2.0", sandbox: true });
    document.getElementById("t").innerText = "Hazır 👍";
  } catch (e) {
    document.getElementById("t").innerText = "Pi yüklenemedi ❌";
  }
};

// Giriş
document.getElementById("loginBtn").onclick = async function () {
  document.getElementById("t").innerText = "Giriş yapılıyor...";

  try {
    user = await Pi.authenticate(['payments']);
    document.getElementById("t").innerText = "Giriş başarılı ✅";
  } catch (e) {
    document.getElementById("t").innerText = "Hata ❌";
  }
};

// Ödeme
document.getElementById("payBtn").onclick = function () {
  if (!user) {
    document.getElementById("t").innerText = "Önce giriş yap";
    return;
  }

  document.getElementById("t").innerText = "Ödeme başlatılıyor...";

  Pi.createPayment({
    amount: 0.01,
    memo: "Test",
    metadata: {}
  }, {
    onReadyForServerApproval: function () {},
    onReadyForServerCompletion: function () {
      document.getElementById("t").innerText = "Tamamlandı ✅";
    },
    onCancel: function () {
      document.getElementById("t").innerText = "İptal";
    },
    onError: function () {
      document.getElementById("t").innerText = "Hata ❌";
    }
  });
};
</script>

</body>
</html>
