<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pi Ödeme</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; margin-top:100px; font-family:sans-serif;">

<h2>Pi Test Ödeme</h2>

<button onclick="odeme()" style="padding:15px; font-size:18px;">
  0.01 Pi Gönder
</button>

<p id="yazi"></p>

<script>
  // BASİT BAŞLATMA (sandbox kapalı)
  Pi.init({ version: "2.0" });

  function odeme() {
    document.getElementById("yazi").innerText = "Ödeme başlatılıyor...";

    Pi.createPayment({
      amount: 0.01,
      memo: "Test",
      metadata: { test: true }
    }, {

      onReadyForServerApproval: function(paymentId) {
        // TAKILMAYI ENGELLEYEN KISIM
        setTimeout(function() {
          Pi.completePayment(paymentId);
        }, 1000);
      },

      onReadyForServerCompletion: function(paymentId, txid) {
        document.getElementById("yazi").innerText = "Ödeme tamamlandı ✅";
      },

      onCancel: function() {
        document.getElementById("yazi").innerText = "İptal edildi";
      },

      onError: function() {
        document.getElementById("yazi").innerText = "Hata oluştu";
      }

    });
  }
</script>

</body>
</html>
