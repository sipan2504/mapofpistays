⁸<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pi Test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; margin-top:100px; font-family:sans-serif;">

<h2>Pi Test Ödeme</h2>

<button id="login">Giriş Yap</button>
<br><br>
<button id="pay">0.01 Pi Gönder</button>

<p id="status"></p>

<script>
  window.onload = function() {

    if (typeof Pi === "undefined") {
      document.getElementById("status").innerText = "Pi SDK yüklenmedi ❌";
      return;
    }

    Pi.init({
      version: "2.0",
      key: "khfni9u4hqjirflobot0l17xamrsplsl9vapiyd2kcy6taqxso4h8coctpelc1g0"
    });

    let user = null;

    document.getElementById("login").onclick = function() {
      Pi.authenticate(['payments'], function(auth) {
        user = auth.user;
        document.getElementById("status").innerText = "Giriş başarılı ✅";
      }, function() {
        document.getElementById("status").innerText = "Giriş hatası";
      });
    };

    document.getElementById("pay").onclick = function() {
      if (!user) {
        document.getElementById("status").innerText = "Önce giriş yap!";
        return;
      }

      document.getElementById("status").innerText = "Ödeme açılıyor...";

      Pi.createPayment({
        amount: 0.01,
        memo: "Test",
        metadata: {}
      }, {
        onReadyForServerApproval: function(paymentId) {
          console.log(paymentId);
        },
        onReadyForServerCompletion: function() {
          document.getElementById("status").innerText = "Tamamlandı ✅";
        },
        onCancel: function() {
          document.getElementById("status").innerText = "İptal";
        },
        onError: function(e) {
          document.getElementById("status").innerText = "Hata";
          console.log(e);
        }
      });
    };

  };
</script>

</body>
</html>
