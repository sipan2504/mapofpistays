<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Map of Pi Stays</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="font-family:Arial;text-align:center;padding-top:100px;">

<h1>Map of Pi Stays</h1>
<p id="status">Başlatılıyor...</p>
<button id="loginBtn">Pi Giriş Yap</button>

<script>
let currentUser = null;

async function initPi() {
  try {
    await Pi.init({
      version: "2.0",
      sandbox: false
    });

    document.getElementById("status").innerText = "Pi hazır ✅";
  } catch (e) {
    document.getElementById("status").innerText = "Pi SDK hatası ❌";
    console.log(e);
  }
}

async function loginPi() {
  try {
    currentUser = await Pi.authenticate(
      ["username", "payments"],
      function(payment) {
        return payment;
      }
    );

    document.getElementById("status").innerText =
      "Giriş başarılı ✅";

    console.log(currentUser);

  } catch (e) {
    document.getElementById("status").innerText =
      "Giriş başarısız ❌";
    console.log(e);
  }
}

document.getElementById("loginBtn").onclick = loginPi;
window.onload = initPi;
</script>

</body>
</html>
