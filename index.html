<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Test App</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding-top:100px;
}
button{
padding:12px 20px;
font-size:18px;
}
</style>

</head>
<body>

<h1>Pi Test App</h1>

<p id="status">Yükleniyor...</p>

<button onclick="loginPi()">Pi Giriş Yap</button>

<br><br>

<button onclick="sendPayment()">0.01 Pi Gönder</button>

<script>

let currentUser = null;

async function loginPi(){

const status=document.getElementById("status");

try{

if(typeof Pi==="undefined"){
status.innerHTML="Pi SDK bulunamadı ❌";
return;
}

await Pi.init({
version:"2.0",
sandbox:true
});

status.innerHTML="Giriş ekranı bekleniyor...";

currentUser=await Pi.authenticate(
["payments"],
function(){},
function(){}
);

status.innerHTML=
"Giriş başarılı ✅<br><b>"+currentUser.username+"</b>";

}catch(error){

console.log(error);

status.innerHTML=
"HATA ❌<br>"+JSON.stringify(error);

}

}

async function sendPayment(){

if(!currentUser){
alert("Önce Pi giriş yap");
return;
}

Pi.createPayment(
{
amount:0.01,
memo:"Pi Test Payment",
metadata:{}
},
{
onReadyForServerApproval:function(paymentId){
console.log(paymentId);
},

onReadyForServerCompletion:function(paymentId){
document.getElementById("status").innerHTML=
"Ödeme tamamlandı ✅";
},

onCancel:function(){
document.getElementById("status").innerHTML=
"Ödeme iptal edildi";
},

onError:function(error){
console.log(error);
document.getElementById("status").innerHTML=
"Ödeme hatası ❌";
}
}
);

}

window.onload=function(){
document.getElementById("status").innerHTML=
"Pi Giriş Yap butonuna bas";
};

</script>

</body>
</html>
