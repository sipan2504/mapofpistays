<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center; margin-top:100px;">

<h2>Pi Test Ödeme</h2>

<button onclick="login()">Giriş Yap</button>
<br><br>
<button onclick="pay()">0.01 Pi Gönder</button>

<p id="t"></p>

<script>
let piReady = false;

document.addEventListener("DOMContentLoaded", function () {
  document.getElementById("t").innerText = "Pi yükleniyor...";

  setTimeout(function () {
    Pi.init({
      version: "2.0",
      sandbox: true
    });
    piReady = true;
    document.getElementById("t").innerText = "Hazır 👍";
  }, 1000);
});

function login() {
  if (!piReady) {
    document.getElementById("t").innerText = "Henüz hazır değil";
    return;
  }

  document.getElementById("t").innerText = "Giriş yapılıyor...";

  Pi.authenticate(['payments'], function(auth) {
    document.getElementById("t").innerText = "Giriş başarılı ✅";
  }, function(error) {
    document.getElementById("t").innerText = "Hata ❌";
  });
}

function pay() {
  if (!piReady) {
    document.getElementById("t").innerText = "Önce giriş yap";
    return;
  }

  document.getElementById("t").innerText = "Ödeme başlatılıyor...";

  Pi.createPayment({
    amount: 0.01,
    memo: "Test ödeme",
    metadata: {}
  }, {
    onReadyForServerApproval: function () {
      document.getElementById("t").innerText = "Onay bekleniyor...";
    },
    onReadyForServerCompletion: function () {
      document.getElementById("t").innerText = "Tamamlandı ✅";
    },
    onCancel: function () {
      document.getElementById("t").innerText = "İptal edildi";
    },
    onError: function () {
      document.getElementById("t").innerText = "Hata ❌";
    }
  });
}
</script>

</body>
</html>
