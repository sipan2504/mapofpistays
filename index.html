<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map of Pi Stays</title><script src="https://sdk.minepi.com/pi-sdk.js"></script><link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
}

header{
  background:#6f3ff5;
  color:#fff;
  text-align:center;
  padding:15px;
  font-size:24px;
}

#status{
  text-align:center;
  padding:10px;
}

#loginBtn{
  display:block;
  margin:10px auto;
  padding:12px 20px;
  font-size:18px;
}

#map{
  width:100%;
  height:60vh;
}

#addStay{
  display:none;
  padding:20px;
  padding-bottom:220px;
}

input,
textarea{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  margin:10px 0;
  font-size:16px;
  border:1px solid #ccc;
  border-radius:10px;
  background:#fff;
  color:#000;
}

button.saveBtn{
  width:100%;
  padding:15px;
  font-size:18px;
  margin-bottom:20px;
}

.bottom-menu{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  border-top:1px solid #ddd;
  display:flex;
  justify-content:space-around;
  padding:15px 0;
  font-size:28px;
}
</style></head><body><header>
🌍 Map of Pi Stays
</header><div id="status">
Başlatılıyor...
</div><button id="loginBtn">
Pi Giriş Yap
</button>
  <button id="payBtn" style="display:none;margin:10px auto;padding:12px 20px;font-size:18px;background:#6f3ff5;color:#fff;border:none;border-radius:10px;">
💰 Pay with Pi (0.01 Pi)
  </button>
  <div id="map"></div><div id="addStay"><h2>➕ Yeni Konaklama</h2><input id="stayName" type="text"
placeholder="🏠 Konaklama Adı">

<input id="stayCountry" type="text"
placeholder="🌍 Ülke">

<input id="stayCity" type="text"
placeholder="🏙️ Şehir">

<textarea id="stayDesc"
placeholder="📝 Açıklama"></textarea><button class="saveBtn"
onclick="useMyLocation()">
📍 Konumumu Kullan
</button>

<p id="locationText">
Henüz konum seçilmedi
</p><button class="saveBtn"
onclick="saveStay()">
Kaydet
</button>

</div><div class="bottom-menu">
<div onclick="showHome()">🏠</div>
<div onclick="showAddStay()">➕</div>
<div>❤️</div>
<div>👤</div>
</div><script>

let currentUser = null;
let map = null;
let selectedLat = null;
let selectedLng = null;

async function initPi(){
  try{
    await Pi.init({
      version:"2.0",
      sandbox:false
    });

    document.getElementById("status")
      .innerHTML = "Pi hazır ✅";

  }catch(e){
    document.getElementById("status")
      .innerHTML = "Pi SDK hatası ❌";
  }
}

async function loginPi(){
  try{

    currentUser =
      await Pi.authenticate(
        ["username"],
        function(){ return true; }
      );

    document.getElementById("status")
      .innerHTML =
      "Giriş başarılı ✅";
    document.getElementById("payBtn").style.display = "block";

  }catch(e){

    document.getElementById("status")
      .innerHTML =
      "Giriş başarısız ❌";
  }
}

document.getElementById("loginBtn")
.onclick = loginPi;

function initMap(){

  map = L.map("map")
    .setView([41,29],3);

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      attribution:
      "&copy; OpenStreetMap"
    }
  ).addTo(map);

  addPin(
    41.0082,
    28.9784,
    "Dilek's Home",
    "İstanbul",
    "Türkiye"
  );

  let stays =
    JSON.parse(
      localStorage.getItem("stays")
      || "[]"
    );

  stays.forEach(function(stay){

    addPin(
      stay.lat,
      stay.lng,
      stay.name,
      stay.city,
      stay.country,
      stay.desc
    );

  });

  if(navigator.geolocation){

    navigator.geolocation
      .getCurrentPosition(
        function(pos){

          const lat =
            pos.coords.latitude;

          const lng =
            pos.coords.longitude;

          L.circleMarker(
            [lat,lng],
            {
              radius:8,
              color:"blue",
              fillColor:"blue",
              fillOpacity:1
            }
          )
          .addTo(map)
          .bindPopup(
            "📍 Konumunuz"
          );

        }
      );
  }
}

function addPin(
  lat,
  lng,
  name,
  city,
  country,
  desc=""
){

  L.marker([lat,lng])
    .addTo(map)
    .bindPopup(
      "🏠 " + name +
      "<br>📍 " +
      city + ", " +
      country +
      "<br>📝 " +
      desc
    );
}

function showAddStay(){

  document.getElementById("map")
    .style.display =
    "none";

  document.getElementById("addStay")
    .style.display =
    "block";

  window.scrollTo(0,0);
}

function showHome(){

  document.getElementById("map")
    .style.display =
    "block";

  document.getElementById("addStay")
    .style.display =
    "none";
}

function useMyLocation(){

  if(!navigator.geolocation){
    alert(
      "Konum desteklenmiyor."
    );
    return;
  }

  navigator.geolocation
    .getCurrentPosition(
      function(pos){

        selectedLat =
          pos.coords.latitude;

        selectedLng =
          pos.coords.longitude;

        document.getElementById(
          "locationText"
        ).innerHTML =
          "📍 Konum alındı ✅";

        alert(
          "Konumunuz alındı ✅"
        );

      },
      function(){

        alert(
          "Konum alınamadı."
        );

      }
    );
}

function saveStay(){

  const stay = {
    name:
      document.getElementById(
        "stayName"
      ).value,

    country:
      document.getElementById(
        "stayCountry"
      ).value,

    city:
      document.getElementById(
        "stayCity"
      ).value,

    desc:
      document.getElementById(
        "stayDesc"
      ).value,

    lat: selectedLat,
    lng: selectedLng
  };

  if(
    !stay.name ||
    stay.lat === null ||
    stay.lng === null
  ){
    alert(
      "Önce 📍 Konumumu Kullan butonuna basın."
    );
    return;
  }

  let stays =
    JSON.parse(
      localStorage.getItem("stays")
      || "[]"
    );

  stays.push(stay);

  localStorage.setItem(
    "stays",
    JSON.stringify(stays)
  );

  addPin(
    stay.lat,
    stay.lng,
    stay.name,
    stay.city,
    stay.country,
    stay.desc
  );

  alert(
    "Konaklama kaydedildi ✅"
  );

  showHome();
}

window.onload = function(){

  initPi();
  initMap();

};
</script></body>
</html>
