<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Test App</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="font-family:Arial;text-align:center;padding-top:100px;">

<h1>Pi Test App</h1>

<p id="status">Bağlanılıyor...</p>

<button onclick="sendPayment()">0.01 Pi Gönder</button>

<script>

let currentUser = null;

async function startPi() {

  try {

    Pi.init({
      sandbox: true
    });

    currentUser = await Pi.authenticate(["payments"]);

    document.getElementById("status").innerHTML =
      "Giriş başarılı ✅";

  } catch (error) {

    console.log(error);

    document.getElementById("status").innerHTML =
      "Giriş başarısız ❌";
  }
}

async function sendPayment() {

  if (!currentUser) {
    alert("Önce giriş yap");
    return;
  }

  Pi.createPayment(
    {
      amount: 0.01,
      memo: "Pi Test Payment",
      metadata: {
        test: true
      }
    },
    {
      onReadyForServerApproval: function(paymentId) {
        console.log(paymentId);
      },

      onReadyForServerCompletion: function(paymentId) {
        document.getElementById("status").innerHTML =
          "Ödeme tamamlandı ✅";
      },

      onCancel: function() {
        document.getElementById("status").innerHTML =
          "İptal edildi";
      },

      onError: function(error) {
        console.log(error);
        document.getElementById("status").innerHTML =
          "Ödeme hatası ❌";
      }
    }
  );
}

window.addEventListener("load", startPi);

</script>

</body>
</html>
