<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body style="text-align:center;margin-top:100px;font-family:Arial;">

<h2>Map of Pi Stays</h2>

<button id="loginBtn">Pi ile Giriş Yap</button>

<p id="t">Hazırlanıyor...</p>

<script>
let user = null;

window.onload = async function () {
  try {
    await Pi.init({ version: "2.0", sandbox: true });
    document.getElementById("t").innerText = "Hazır 👍";
  } catch (e) {
    document.getElementById("t").innerText = "Pi yüklenemedi ❌";
  }
};

document.getElementById("loginBtn").onclick = async function () {
  document.getElementById("t").innerText = "Giriş yapılıyor...";

  try {
    user = await Pi.authenticate(["username"]);

    document.getElementById("t").innerHTML =
      "Giriş başarılı ✅<br><br>Hoş geldin " +
      user.username;

  } catch (e) {
    document.getElementById("t").innerText =
      "Giriş başarısız ❌";
  }
};
</script>

</body>
</html>
