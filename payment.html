<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Pi Sandbox Test Ödeme</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { margin: 5px 0; padding: 8px; width: 200px; }
    button { padding: 10px 15px; cursor: pointer; }
    h2 { color: #4CAF50; }
  </style>
</head>
<body>
  <h2>Pi Sandbox Test Ödeme</h2>
  
  <!-- Kullanıcıdan Alıcı ve Miktar Al -->
  <input type="text" id="recipientInput" placeholder="Alıcı Pi ID">
  <br>
  <input type="number" step="0.01" id="amountInput" placeholder="Miktar Pi">
  <br>
  <button id="sendButton">Pi Gönder</button>

  <script>
    // Ödeme fonksiyonu
    async function sendPi(amount, recipient) {
      try {
        // Boş değerler için default ayarlar
        if (!recipient) recipient = "default_test_user";
        if (!amount) amount = 0.01;

        const paymentData = {
          amount: amount,
          recipient: recipient,
          metadata: "Sandbox test payment" // Metadata her zaman dolu
        };

        // Pi Testnet API çağrısı (simülasyon)
        // Gerçek kullanım: piAPI.sendPayment(paymentData)
        console.log("Simüle Edilen Ödeme ✅", paymentData);
        alert(`Ödeme başarılı! ${amount} Pi gönderildi.\nAlıcı: ${recipient}`);

      } catch (error) {
        console.error("Hata ⚠️", error);
        alert(`Ödeme sırasında hata oluştu: ${error.message}`);
      }
    }

    // Buton tıklamasıyla ödeme gönder
    document.getElementById("sendButton").addEventListener("click", () => {
      const amount = parseFloat(document.getElementById("amountInput").value) || 0.01;
      const recipient = document.getElementById("recipientInput").value || "default_test_user";
      sendPi(amount, recipient);
    });
  </script>
</body>
</html>
